# Construit le site Astro à chaque push sur `main` et publie le résultat
# optimisé (dossier dist/) dans la branche `www`.
#
# La branche `www` ne contient QUE le site construit, sans historique :
# à chaque déploiement, elle est réécrite avec un unique commit
# (force_orphan). Pointez votre hébergement (GitHub Pages, etc.) sur cette
# branche.
name: Construire et publier (branche www)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Nécessaire pour que l'action puisse pousser sur la branche www.
permissions:
  contents: write

# Un seul build à la fois ; on annule le précédent s'il est encore en cours.
concurrency:
  group: build-www
  cancel-in-progress: true

jobs:
  build-and-publish:
    name: Construire et publier
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site
        run: npm run build

      - name: Publier dist/ sur la branche www (sans historique)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: www
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Build du site depuis main'
